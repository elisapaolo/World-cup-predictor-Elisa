from __future__ import annotations

import os
from typing import Optional

import pandas as pd
import requests

API_FOOTBALL_URL = "https://v3.football.api-sports.io/fixtures"


def _api_key() -> Optional[str]:
    """Find API-Football key from Streamlit secrets or environment."""
    # Streamlit may not be installed/importable when this module is tested outside the app.
    try:
        import streamlit as st  # type: ignore
        key = st.secrets.get("API_FOOTBALL_KEY", None)
        if key:
            return str(key)
    except Exception:
        pass
    return os.getenv("API_FOOTBALL_KEY")


def fetch_api_football_results(league: int = 1, season: int = 2026) -> pd.DataFrame:
    """Fetch World Cup fixtures/results from API-Football.

    API-Football's 2026 World Cup identifiers are league=1 and season=2026.
    Returns normalized columns compatible with matches.csv where possible.
    """
    key = _api_key()
    if not key:
        raise RuntimeError("Missing API_FOOTBALL_KEY. Add it to .streamlit/secrets.toml or your environment.")

    response = requests.get(
        API_FOOTBALL_URL,
        headers={"x-apisports-key": key},
        params={"league": league, "season": season},
        timeout=20,
    )
    response.raise_for_status()
    payload = response.json()
    rows = []
    for item in payload.get("response", []):
        fixture = item.get("fixture", {})
        teams = item.get("teams", {})
        goals = item.get("goals", {})
        league_info = item.get("league", {})
        status_short = fixture.get("status", {}).get("short")
        elapsed = fixture.get("status", {}).get("elapsed")
        complete = status_short in {"FT", "AET", "PEN"}
        # API-Football group/round names can vary; preserve whatever it sends.
        rows.append(
            {
                "api_fixture_id": str(fixture.get("id")),
                "date": str(fixture.get("date", ""))[:10],
                "round": league_info.get("round", ""),
                "team1": teams.get("home", {}).get("name"),
                "team2": teams.get("away", {}).get("name"),
                "score1": goals.get("home"),
                "score2": goals.get("away"),
                "status": "Complete" if complete else ("Live" if elapsed else "Scheduled"),
                "status_short": status_short,
            }
        )
    return pd.DataFrame(rows)


def merge_results(local_matches: pd.DataFrame, api_results: pd.DataFrame) -> pd.DataFrame:
    """Merge API results into the local match file.

    Primary match is by exact team names. If a fixture_id column exists and matches the API fixture,
    that can be added later; the starter data uses generated game_id values, so team matching is used.
    """
    updated = local_matches.copy()
    if api_results.empty:
        return updated

    def norm(value: object) -> str:
        return str(value).strip().lower()

    for _, api in api_results.iterrows():
        t1, t2 = norm(api.get("team1")), norm(api.get("team2"))
        if not t1 or not t2:
            continue
        mask = (updated["team1"].map(norm).eq(t1) & updated["team2"].map(norm).eq(t2)) | (
            updated["team1"].map(norm).eq(t2) & updated["team2"].map(norm).eq(t1)
        )
        if not mask.any():
            continue
        idx = updated[mask].index[0]
        same_order = norm(updated.loc[idx, "team1"]) == t1
        if pd.notna(api.get("score1")) and pd.notna(api.get("score2")):
            if same_order:
                updated.loc[idx, ["score1", "score2"]] = [api.get("score1"), api.get("score2")]
            else:
                updated.loc[idx, ["score1", "score2"]] = [api.get("score2"), api.get("score1")]
        if api.get("status") in {"Complete", "Live", "Scheduled"}:
            updated.loc[idx, "status"] = api.get("status")
    return updated
